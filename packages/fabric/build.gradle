buildscript {
    repositories {
        maven {
            url = "https://maven.fabricmc.net/"
        }
        gradlePluginPortal()
        mavenCentral()
    }
    dependencies {
        classpath "net.fabricmc:fabric-loom:${loom_version}"
    }
}

apply plugin: 'fabric-loom'
apply plugin: 'maven-publish'

import groovy.json.JsonOutput
import groovy.json.JsonSlurper

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

// One source tree builds one jar per Minecraft "bucket": a range of Minecraft versions that
// share the same API surface for everything SharedWorld touches. Version-specific code lives
// in src/versioned/<bucket>/ and is swapped in per build. Select with -PsharedworldMcBucket=.
def mcBuckets = [
        "1.21.11": [
                minecraftVersion: "1.21.11",
                fabricApiVersion: "0.141.3+1.21.11",
                minecraftRange  : ">=1.21.11 <1.22",
                javaVersion     : 21,
                loaderVersion   : project.loader_version
        ],
        "1.21.9" : [
                minecraftVersion: "1.21.9",
                fabricApiVersion: "0.134.1+1.21.9",
                minecraftRange  : ">=1.21.9 <1.21.11",
                javaVersion     : 21,
                loaderVersion   : project.loader_version
        ],
        "1.21.6" : [
                minecraftVersion: "1.21.6",
                fabricApiVersion: "0.128.2+1.21.6",
                minecraftRange  : ">=1.21.6 <1.21.9",
                javaVersion     : 21,
                loaderVersion   : project.loader_version
        ],
        "1.20.1" : [
                minecraftVersion: "1.20.1",
                fabricApiVersion: "0.92.9+1.20.1",
                minecraftRange  : ">=1.20.1 <1.21",
                javaVersion     : 17,
                loaderVersion   : "0.15.6"
        ],
]
def mcBucketName = providers.gradleProperty("sharedworldMcBucket").getOrElse("1.21.11")
def mcBucket = mcBuckets[mcBucketName]
if (mcBucket == null) {
    throw new GradleException("Unknown sharedworldMcBucket '${mcBucketName}'. Known buckets: ${mcBuckets.keySet()}")
}
def isDefaultMcBucket = mcBucketName == "1.21.11"

// Compatibility probing: override the selected bucket's Minecraft/fabric-api pair without
// touching the bucket map, e.g. to ask "what breaks on 1.20.4?" before creating a bucket:
//   ./gradlew compileJava -PsharedworldProbeMinecraft=1.20.4 -PsharedworldProbeFabricApi=0.97.3+1.20.4
def probeMinecraft = providers.gradleProperty("sharedworldProbeMinecraft")
def probeFabricApi = providers.gradleProperty("sharedworldProbeFabricApi")
if (probeMinecraft.isPresent()) {
    mcBucket = new LinkedHashMap(mcBucket)
    mcBucket.minecraftVersion = probeMinecraft.get()
    mcBucket.fabricApiVersion = probeFabricApi.getOrElse(mcBucket.fabricApiVersion)
}

def localModsDir = file("local/mods")
def patchedLocalModsDir = file("$buildDir/patched-local-mods")
def extractedLocalJijDir = file("$buildDir/local-jij")
def fakeRunLocalBackendUrl = "http://127.0.0.1:8787"
def fakeRunDevAuthSecretProvider = providers.gradleProperty("sharedworldDevAuthSecret")
        .orElse(providers.environmentVariable("SHAREDWORLD_DEV_AUTH_SECRET"))
def fakeRunDevAuthSecret = fakeRunDevAuthSecretProvider.orNull
def skipDevHelperRuntime = providers.gradleProperty("sharedworldSkipDevHelperRuntime")
        .map { it.toBoolean() }
        .orElse(false)
patchedLocalModsDir.mkdirs()
extractedLocalJijDir.mkdirs()

sourceSets {
    main {
        java.srcDir("src/versioned/${mcBucketName}/java")
        resources.srcDir("src/versioned/${mcBucketName}/resources")
    }
    test {
        java.srcDir("src/versionedTest/${mcBucketName}/java")
    }
    devHelper {
        java.srcDir("src/devhelper/java")
        resources.srcDir("src/devhelper/resources")
        compileClasspath += sourceSets.main.compileClasspath + sourceSets.main.output
        runtimeClasspath += output + compileClasspath + sourceSets.main.runtimeClasspath
    }
}

def devHelperJarTask = tasks.register("devHelperJar", Jar) {
    archiveClassifier = "dev-helper"
    from sourceSets.devHelper.output
}

def devHelperRuntimeJar = files(devHelperJarTask)

repositories {
    maven {
        url = "https://maven.fabricmc.net/"
    }
    mavenCentral()
}

tasks.register("prepareLocalMods") {
    outputs.dir(patchedLocalModsDir)

    doLast {
        delete(patchedLocalModsDir)
        patchedLocalModsDir.mkdirs()

        if (!localModsDir.exists()) {
            return
        }

        fileTree(localModsDir).matching {
            include "*.jar"
            exclude "fabric-api-*.jar"
        }.files.each { jarFile ->
            File outputJar = new File(patchedLocalModsDir, jarFile.name)
            if (!jarFile.name.startsWith("e4mc-")) {
                copy {
                    from jarFile
                    into patchedLocalModsDir
                }
                return
            }

            File tempDir = new File(buildDir, "tmp/patched-mods/${jarFile.name.replace('.jar', '')}")
            delete(tempDir)
            copy {
                from zipTree(jarFile)
                into tempDir
            }

            File mixinConfig = new File(tempDir, "e4mc.mixins.json")
            if (mixinConfig.exists()) {
                def parsed = new JsonSlurper().parse(mixinConfig)
                if (parsed.mixins instanceof List) {
                    // Temporary validation scaffolding for local dev runs: the
                    // shipped SharedWorld jar now gates its own compat mixin,
                    // but we still strip the e4mc redirect here while
                    // verifying the 6.1.0 path end-to-end.
                    parsed.mixins = parsed.mixins.findAll { it != "ServerboundKeyPacketMixin" }
                }
                mixinConfig.text = JsonOutput.prettyPrint(JsonOutput.toJson(parsed)) + "\n"
            }

            ant.zip(destfile: outputJar, basedir: tempDir)
        }
    }
}

tasks.register("extractLocalNestedModJars", Copy) {
    onlyIf {
        patchedLocalModsDir.exists()
    }

    dependsOn(tasks.named("prepareLocalMods"))

    into extractedLocalJijDir
    includeEmptyDirs = false
    duplicatesStrategy = DuplicatesStrategy.INCLUDE

    from({
        fileTree(patchedLocalModsDir).matching {
            include "*.jar"
            exclude "fabric-api-*.jar"
        }.files.collect { jarFile ->
            zipTree(jarFile).matching {
                include "META-INF/jars/*.jar"
            }
        }
    }) {
        eachFile {
            path = name
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${mcBucket.minecraftVersion}"
    mappings loom.officialMojangMappings()

    modImplementation "net.fabricmc:fabric-loader:${mcBucket.loaderVersion}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${mcBucket.fabricApiVersion}"
    // Minecraft 1.21.11+ exposes jspecify on the mod compile classpath; older versions do
    // not, so SharedWorld brings its own copy for the @Nullable annotations it uses.
    compileOnly "org.jspecify:jspecify:1.0.0"
    // Loom's source-set classpath grouping is not enough on its own for our fake
    // client runs; package the helper as a real runtime mod so the login bypass
    // mixin is actually present when HostA/GuestB connect through e4mc.
    // A clean checkout needs one priming build to materialize that jar before
    // Loom can checksum it as a local runtime mod.
    // The dev helper only exists for local fake-account runs, which always use the default
    // bucket; its login mixin tracks that Minecraft version only.
    if (!skipDevHelperRuntime.get() && isDefaultMcBucket) {
        modLocalRuntime(devHelperRuntimeJar)
    }
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    if (localModsDir.exists()) {
        modLocalRuntime(files({
            fileTree(patchedLocalModsDir).matching {
                include "*.jar"
                exclude "fabric-api-*.jar"
            }.files
        }))
        modLocalRuntime(files({
            fileTree(extractedLocalJijDir).matching {
                include "*.jar"
            }.files
        }))
    }
}

loom {
    mods {
        sharedworld {
            sourceSet sourceSets.main
        }
        sharedworldDevHelper {
            sourceSet sourceSets.devHelper
        }
    }
    runs {
        fakeHost {
            inherit client
            configName = "SharedWorld Fake Host"
            runDir = "run-host"
            def hostName = "HostA"
            def hostUuid = "11111111-1111-1111-1111-111111111111"
            vmArgs "-Dsharedworld.backendUrl=${fakeRunLocalBackendUrl}"
            vmArgs "-Dsharedworld.devPlayerName=${hostName}"
            vmArgs "-Dsharedworld.devPlayerUuid=${hostUuid}"
            if (fakeRunDevAuthSecret != null) {
                vmArgs "-Dsharedworld.devAuthSecret=${fakeRunDevAuthSecret}"
            }
            programArg "--username=${hostName}"
            programArg "--uuid=${hostUuid}"
        }
        fakeGuest {
            inherit client
            configName = "SharedWorld Fake Guest"
            runDir = "run-guest"
            def guestName = "GuestB"
            def guestUuid = "22222222-2222-2222-2222-222222222222"
            vmArgs "-Dsharedworld.backendUrl=${fakeRunLocalBackendUrl}"
            vmArgs "-Dsharedworld.devPlayerName=${guestName}"
            vmArgs "-Dsharedworld.devPlayerUuid=${guestUuid}"
            if (fakeRunDevAuthSecret != null) {
                vmArgs "-Dsharedworld.devAuthSecret=${fakeRunDevAuthSecret}"
            }
            programArg "--username=${guestName}"
            programArg "--uuid=${guestUuid}"
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    if (graph.allTasks.any { it.name in ["runFakeHost", "runFakeGuest"] } && !fakeRunDevAuthSecretProvider.isPresent()) {
        throw new GradleException(
                "Fake SharedWorld runs require a dev auth secret. Set DEV_AUTH_SECRET in " +
                        "packages/backend/.dev.vars and pass it with -PsharedworldDevAuthSecret=..., " +
                        "or pass -PsharedworldDevAuthSecret=... explicitly."
        )
    }
}

tasks.named("configureLaunch").configure {
    dependsOn(tasks.named("prepareLocalMods"))
    dependsOn(tasks.named("extractLocalNestedModJars"))
    if (isDefaultMcBucket) {
        dependsOn(devHelperJarTask)
    }
}

tasks.named("generateRemapClasspath").configure {
    dependsOn(tasks.named("prepareLocalMods"))
    dependsOn(tasks.named("extractLocalNestedModJars"))
    if (isDefaultMcBucket) {
        dependsOn(devHelperJarTask)
    }
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraftRange", mcBucket.minecraftRange
    inputs.property "javaVersion", mcBucket.javaVersion
    inputs.property "loaderVersion", mcBucket.loaderVersion

    filesMatching("fabric.mod.json") {
        expand "version": inputs.properties.version,
               "minecraftRange": inputs.properties.minecraftRange,
               "javaVersion": inputs.properties.javaVersion,
               "loaderVersion": inputs.properties.loaderVersion
    }
}

tasks.named("remapJar").configure {
    archiveVersion = "${project.mod_version}+mc${mcBucketName}"
}

tasks.named("processDevHelperResources").configure {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": inputs.properties.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = mcBucket.javaVersion
}

tasks.named("test").configure {
    useJUnitPlatform {
        excludeTags "integration"
    }
}

tasks.register("integrationTest", Test) {
    group = "verification"
    description = "Runs opt-in backend/mod integration tests against the local integration backend."
    // This task expects a local backend harness to already be running.
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    shouldRunAfter(tasks.named("test"))
    useJUnitPlatform {
        includeTags "integration"
    }
    systemProperty(
            "sharedworld.integration.backendUrl",
            System.getProperty("sharedworld.integration.backendUrl", "http://127.0.0.1:18787")
    )
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.toVersion(mcBucket.javaVersion)
    targetCompatibility = JavaVersion.toVersion(mcBucket.javaVersion)
}

publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }
}
